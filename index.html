<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web Alpine Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #top-bar { 
            height: 40px; 
            background: #050505; 
            color: #00ff41; 
            display: flex; 
            align-items: center; 
            padding: 0 10px; 
            border-bottom: 2px solid #1a1a1a; 
            justify-content: space-between;
            box-shadow: 0 2px 10px rgba(0,255,65,0.1);
        }
        #terminal { height: calc(100vh - 40px); width: 100vw; }

        .btn-group { display: flex; gap: 5px; }
        .cmd-btn {
            background: #111;
            color: #00ff41;
            border: 1px solid #00ff41;
            font-family: monospace;
            font-size: 10px;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .cmd-btn:active { background: #00ff41; color: #000; }
        .stop-btn { border-color: #ff0000; color: #ff0000; }
        .stop-btn:active { background: #ff0000; color: #fff; }

        #status-monitor { font-size: 10px; color: #444; display: flex; align-items: center; }
        .dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; background: #333; }
        .online { background: #00ff41; box-shadow: 0 0 5px #00ff41; }
    </style>
</head>
<body>
    <div id="top-bar">
        <div id="status-monitor">
            <div id="status-dot" class="dot"></div>
            IP: <span id="ip-addr" style="margin-left:4px">DET...</span>
        </div>

        <div class="btn-group">
            <button class="cmd-btn" onclick="sendCmd('\x02')">Prefix(Ctl+B)</button>
            <button class="cmd-btn" onclick="sendCmd('\x02%')">Split-V</button>
            <button class="cmd-btn" onclick="sendCmd('\x02&quot;')">Split-H</button>
            <button class="cmd-btn" onclick="sendCmd('\x02o')">Next-Pane</button>
            <button class="cmd-btn" onclick="sendCmd('clear\n')">Clear</button>
            <button class="cmd-btn stop-btn" onclick="sendStop()">STOP(Ctl+C)</button>
        </div>
    </div>

    <div id="terminal"></div>

    <script>
        const socket = io();
        const term = new Terminal({ 
            cursorBlink: true, 
            theme: { background: '#000', foreground: '#00ff41', cursor: '#00ff41' }, 
            fontSize: 13,
            allowProposedApi: true
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));

        socket.on('connect', () => {
            document.getElementById('status-dot').className = 'dot online';
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
                document.getElementById('ip-addr').innerText = d.ip;
            });
        });

        socket.on('output', (data) => term.write(data));
        term.onData(data => socket.emit('input', data));

        function sendCmd(cmd) {
            socket.emit('input', cmd);
            term.focus();
        }

        function sendStop() { socket.emit('stop_signal'); term.focus(); }

        window.onresize = () => fitAddon.fit();
        setTimeout(() => { fitAddon.fit(); term.focus(); }, 500);
    </script>
</body>
</html>
